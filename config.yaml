# ═══════════════════════════════════════════════════
# EMA Scalper: структура 15m, трейлинг; trade_sessions пустой = 24/7 UTC
# ETH/BTC/SOL, Hyperliquid, 5m
# ═══════════════════════════════════════════════════

exchange:
  name: hyperliquid
  testnet: false

strategy:
  mode: scalping
  timeframe: 15m
  lookback_periods: 60
  entry_zscore: 1.5
  exit_zscore: 0.3
  stop_zscore: 3.0

pairs: []

risk:
  max_position_usdt: 500
  max_total_exposure: 1500
  max_daily_loss_pct: 3.0
  leverage: 5
  commission_pct: 0.1

scalping:
  enabled: false

breakout:
  enabled: false

ema_scalper:
  enabled: true
  exchange: hyperliquid
  testnet: false
  dry_run: true

  pairs:
    - symbol: "ETH/USDC:USDC"
      enabled: true
    - symbol: "BTC/USDC:USDC"
      enabled: true
    - symbol: "SOL/USDC:USDC"
      enabled: true

  timeframe: 5m

  entry:
    ema_period: 9
    volume_lookback: 10
    volume_multiplier: 1.5
    min_candles_above_below: 3
    max_candles_above_below: 8
    higher_tf: "15m"
    momentum_mode: loose
    min_candle_body_pct: 0.05
    min_volume_usdt: 500000
    cooldown_candles: 3
    rsi_period: 14
    rsi_long_max: 65
    rsi_short_min: 35
    market_structure_enabled: true
    min_volume_percentile: 0
    higher_tf_min_volume_ratio: 0.0
    volume_percentile_lookback: 0

    # Всё выключено:
    no_trade_hours_utc: []
    trade_sessions_utc: []           # пусто = 24/7 UTC
    adx_filter_enabled: false
    macd_filter_enabled: false
    ob_filter_enabled: false
    ote_filter_enabled: false
    anti_flat_enabled: false
    entry_max_distance_from_ema_pct: 0.0
    vwap_max_distance_pct: 0.0

  exit:
    take_profit_pct: 1.2
    stop_loss_pct: 0.4
    trailing_stop_enabled: true
    trailing_activation_pct: 0.3
    trailing_distance_pct: 0.2
    use_atr_targets: false
    max_hold_candles: 10
    ema_cross_exit: false

  risk:
    use_exchange_balance: false
    balance_usdt: 500
    position_size_pct: 25
    max_open_positions: 2
    leverage: 5
    max_daily_loss_pct: 3.0
    use_limit_orders: true

  auto:
    enabled: false

  bot:
    loop_interval_sec: 10

bot:
  loop_interval_sec: 30
  dry_run: true
