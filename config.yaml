# ═══════════════════════════════════════════════
# EMA Scalper — рабочий конфиг
# Протестировано: ETH/BTC/SOL на Hyperliquid
# Депозит: $500 | Плечо: x5 | dry_run: true
# ═══════════════════════════════════════════════

exchange:
  name: hyperliquid
  testnet: false

strategy:
  mode: scalping
  timeframe: 15m
  lookback_periods: 60
  entry_zscore: 1.5
  exit_zscore: 0.3
  stop_zscore: 3.0

pairs: []

risk:
  max_position_usdt: 500
  max_total_exposure: 1500
  max_daily_loss_pct: 3.0
  leverage: 5
  commission_pct: 0.1

scalping:
  enabled: false

breakout:
  enabled: false

ema_scalper:
  enabled: true
  exchange: hyperliquid
  testnet: false
  dry_run: true              # ← менять на false только после 50+ сделок в плюсе

  pairs:
    - symbol: "ETH/USDC:USDC"
      enabled: true
    - symbol: "BTC/USDC:USDC"
      enabled: true
    - symbol: "SOL/USDC:USDC"
      enabled: true

  timeframe: 5m

  entry:
    ema_period: 9
    volume_lookback: 10
    volume_multiplier: 1.5
    min_candles_above_below: 3
    max_candles_above_below: 8
    higher_tf: "15m"
    min_candle_body_pct: 0.05
    no_trade_hours_utc: [2, 3, 4]
    min_volume_usdt: 1000000
    cooldown_candles: 4
    momentum_mode: strict
    rsi_period: 14
    rsi_long_max: 65
    rsi_short_min: 35
    ob_filter_enabled: true
    ob_lookback: 15
    ote_filter_enabled: true
    ote_swing_lookback: 20
    min_confidence_score: 60
    adx_filter_enabled: false

  exit:
    take_profit_pct: 0.8
    stop_loss_pct: 0.4
    max_hold_candles: 6
    ema_cross_exit: false
    use_atr_targets: false     # выключить — пока стабилизируем фиксированный TP/SL

  risk:
    use_exchange_balance: false
    balance_usdt: 500
    position_size_pct: 25
    max_open_positions: 2
    leverage: 5
    max_daily_loss_pct: 3.0
    use_limit_orders: true

  auto:
    enabled: false             # автотюнер выключить — мешает анализу

  bot:
    loop_interval_sec: 10

bot:
  loop_interval_sec: 30
  dry_run: true
