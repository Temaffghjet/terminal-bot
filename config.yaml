# Hyperliquid + EMA Scalper 5m. Секреты: HYPERLIQUID_* в .env
# Stat-arb / breakout / старый scalping 1m в коде выключены — см. strategy.mode + флаги enabled.

exchange:
  name: hyperliquid
  testnet: false

strategy:
  mode: scalping
  timeframe: 15m
  lookback_periods: 60
  entry_zscore: 1.5
  exit_zscore: 0.3
  stop_zscore: 3.0

pairs: []

risk:
  max_position_usdt: 500
  max_total_exposure: 2000
  max_daily_loss_pct: 3.0
  leverage: 5
  commission_pct: 0.1

scalping:
  enabled: false

breakout:
  enabled: false

ema_scalper:
  enabled: true
  exchange: hyperliquid
  testnet: false
  dry_run: true
  pairs:
    - symbol: "ETH/USDC:USDC"
      enabled: true
    - symbol: "BTC/USDC:USDC"
      enabled: true
  timeframe: 5m
  entry:
    ema_period: 9
    volume_lookback: 10
    volume_multiplier: 1.5
    min_candles_above_below: 3
    min_candle_body_pct: 0.05
    no_trade_hours_utc: [2, 3, 4]
    min_volume_usdt: 500000
    cooldown_candles: 4
    higher_tf: "15m"
    higher_tf_ema_period: 9
    rsi_period: 14
    rsi_long_max: 65
    rsi_short_min: 35
  exit:
    take_profit_pct: 1.5
    stop_loss_pct: 0.5
    max_hold_candles: 8
    ema_cross_exit: false
  risk:
    balance_usdt: 50
    position_size_pct: 25
    max_open_positions: 2
    leverage: 5
    max_daily_loss_pct: 5.0
    use_limit_orders: true
  bot:
    loop_interval_sec: 10

bot:
  loop_interval_sec: 30
  dry_run: true
