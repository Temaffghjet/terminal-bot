# =============================================================================
# Trading Bot — конфиг под спецификацию Cursor AI (§1–12), только Hyperliquid.
# Ключи: HYPERLIQUID_WALLET_ADDRESS + HYPERLIQUID_PRIVATE_KEY в .env
# Режимы UI: testnet → жёлтый баннер; dry_run → синий; оба false → красный LIVE.
# =============================================================================

exchange:
  name: "hyperliquid"
  # §3 / §9: на старте лучше testnet; mainnet + реальная маржа → false
  testnet: true

# --- Stat-Arb (спред, z-score) — strategy.mode: "pairs" ----------------------------
# На Hyperliquid нет XRP/BNB перпов в ccxt — используем BTC/ETH/SOL (проверка: load_markets()).
pairs:
  - symbol_a: "BTC/USDC:USDC"
    symbol_b: "ETH/USDC:USDC"
    hedge_ratio: 0.95
    enabled: true

  - symbol_a: "BTC/USDC:USDC"
    symbol_b: "SOL/USDC:USDC"
    hedge_ratio: 1.32
    enabled: false

  - symbol_a: "ETH/USDC:USDC"
    symbol_b: "SOL/USDC:USDC"
    hedge_ratio: 1.05
    enabled: false

strategy:
  mode: "pairs" # "pairs" = stat-arb | "scalping" = микроскальп по scalping.*
  timeframe: "15m"
  lookback_periods: 60
  entry_zscore: 1.5
  exit_zscore: 0.3
  stop_zscore: 3.0

risk:
  max_position_usdt: 500
  max_total_exposure: 2000
  max_daily_loss_pct: 3.0
  leverage: 5
  commission_pct: 0.1

# Микроскальп (отдельный режим; выкл. пока работает stat-arb)
scalping:
  enabled: false
  pairs:
    - symbol: "BTC/USDC:USDC"
      enabled: false
    - symbol: "ETH/USDC:USDC"
      enabled: false
  timeframe: "1m"
  deposit_usdt: 50
  risk_per_trade_pct: 20
  max_positions: 2
  entry:
    ema_period: 9
    volume_multiplier: 1.2
    min_candles: 2
    volume_lookback: 10
  exit:
    take_profit_pct: 0.6
    stop_loss_pct: 0.5
    max_hold_minutes: 3
  filters:
    no_trade_hours: [0, 1]
    min_volume_usdt: 1000000
  ohlcv_backtest: "hyperliquid"

# --- §11 Breakout 1H (опционально, параллельный цикл) -----------------------------
breakout:
  enabled: false
  exchange: "hyperliquid"
  testnet: true
  dry_run: true
  pairs:
    - symbol: "ETH/USDC:USDC"
      enabled: true
    - symbol: "BTC/USDC:USDC"
      enabled: false
  timeframe: "1h"
  lookback_candles: 20
  volume_multiplier: 1.2
  exit:
    take_profit_pct: 4.0
    stop_loss_pct: 2.0
    use_trailing_stop: false
  risk:
    balance_usdt: 1000
    position_size_pct: 15
    max_open_positions: 2
    leverage: 3
    max_daily_loss_pct: 5.0
    use_limit_orders: true
  bot:
    loop_interval_sec: 60

# --- §12 EMA Micro-Scalper 5m (опционально; «primary» для малых депозитов) --------
ema_scalper:
  enabled: false
  exchange: "hyperliquid"
  testnet: true
  dry_run: true
  pairs:
    - symbol: "ETH/USDC:USDC"
      enabled: true
    - symbol: "BTC/USDC:USDC"
      enabled: false
  timeframe: "5m"
  entry:
    ema_period: 9
    volume_lookback: 10
    volume_multiplier: 1.2
    min_candles_above_below: 2
    no_trade_hours_utc: [2, 3, 4]
    min_volume_usdt: 500000
    cooldown_candles: 2
  exit:
    take_profit_pct: 1.5
    stop_loss_pct: 0.5
    max_hold_candles: 12
    ema_cross_exit: true
  risk:
    balance_usdt: 50
    position_size_pct: 25
    max_open_positions: 2
    leverage: 5
    max_daily_loss_pct: 5.0
    use_limit_orders: true
  bot:
    loop_interval_sec: 10

# Главный цикл stat-arb + флаги симуляции (§3)
bot:
  loop_interval_sec: 30
  dry_run: true
