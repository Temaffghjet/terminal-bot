# ═══════════════════════════════════════════════
# EMA Scalper — Hyperliquid 5m (смягчённые фильтры + явные ключи)
# Секреты: HYPERLIQUID_* в .env (для fetch_positions и live)
# ═══════════════════════════════════════════════

exchange:
  name: hyperliquid
  testnet: false

strategy:
  mode: scalping
  timeframe: 15m
  lookback_periods: 60
  entry_zscore: 1.5
  exit_zscore: 0.3
  stop_zscore: 3.0

pairs: []

risk:
  max_position_usdt: 500
  max_total_exposure: 1500
  max_daily_loss_pct: 3.0
  leverage: 5
  commission_pct: 0.1

scalping:
  enabled: false

breakout:
  enabled: false

ema_scalper:
  enabled: true
  exchange: hyperliquid
  testnet: false
  dry_run: true

  pairs:
    - symbol: "ETH/USDC:USDC"
      enabled: true
    - symbol: "BTC/USDC:USDC"
      enabled: true
    - symbol: "SOL/USDC:USDC"
      enabled: true

  timeframe: 5m

  entry:
    ema_period: 9
    volume_lookback: 10
    volume_multiplier: 1.3
    min_candles_above_below: 3
    max_candles_above_below: 8
    higher_tf: "15m"
    allow_trading_when_higher_tf_flat: true
    min_candle_body_pct: 0.05
    no_trade_hours_utc: [2, 3, 4]
    # Было 1_000_000 — отсекало почти всё на 5m
    min_volume_usdt: 0
    cooldown_candles: 3
    momentum_mode: loose
    entry_max_distance_from_ema_pct: 1.5
    rsi_period: 14
    rsi_long_max: 68
    rsi_short_min: 32
    # Явно: раньше включались умолчания и душили входы
    macd_filter_enabled: false
    macd_hist_rising_required: false
    macd_fast_period: 12
    macd_slow_period: 26
    macd_signal_period: 9
    adx_filter_enabled: false
    adx_period: 14
    adx_threshold: 20
    vwap_lookback: 20
    vwap_max_distance_pct: 2.5
    min_volume_percentile: 35
    volume_percentile_lookback: 40
    higher_tf_min_volume_ratio: 0
    anti_flat_enabled: false
    anti_flat_min_atr_pct: 0.08
    atr_period: 14
    # OTE / Order Block (мягче порог confluence)
    ob_filter_enabled: true
    ob_lookback: 15
    ob_impulse_atr_mult: 1.5
    ote_filter_enabled: true
    ote_swing_lookback: 20
    min_confidence_score: 55

  exit:
    take_profit_pct: 0.8
    stop_loss_pct: 0.4
    max_hold_candles: 6
    ema_cross_exit: false
    use_atr_targets: false

  risk:
    use_exchange_balance: false
    balance_usdt: 500
    position_size_pct: 25
    max_open_positions: 2
    leverage: 5
    max_daily_loss_pct: 3.0
    use_limit_orders: true

  auto:
    enabled: false

  bot:
    loop_interval_sec: 10

bot:
  loop_interval_sec: 30
  dry_run: true
