# §8 — Тест $100: stat-arb, Hyperliquid testnet + dry_run
exchange:
  name: "hyperliquid"
  testnet: true

pairs:
  - symbol_a: "BTC/USDC:USDC"
    symbol_b: "ETH/USDC:USDC"
    hedge_ratio: 0.95
    enabled: true

strategy:
  mode: "pairs"
  timeframe: "15m"
  lookback_periods: 60
  entry_zscore: 1.8
  exit_zscore: 0.4
  stop_zscore: 2.8

risk:
  max_position_usdt: 30
  max_total_exposure: 60
  max_daily_loss_pct: 5.0
  leverage: 2
  commission_pct: 0.1

scalping:
  enabled: false
  pairs: []
  deposit_usdt: 100

breakout:
  enabled: false

ema_scalper:
  enabled: false

bot:
  loop_interval_sec: 30
  dry_run: true
